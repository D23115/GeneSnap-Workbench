name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e .

      - name: Run tests
        env:
          PYTHONPATH: src
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v
